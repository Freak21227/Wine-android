name: Build Wine Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      release:
        description: 'Wine release tag (e.g. 9.0). Leave empty for debug build.'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 300

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
         java-version: '17'
         distribution: 'temurin'

      - name: Add deb-src to sources.list
        run: |
          sudo tee -a /etc/apt/sources.list > /dev/null <<EOF
          deb-src http://archive.ubuntu.com/ubuntu/ jammy main restricted universe multiverse
          deb-src http://archive.ubuntu.com/ubuntu/ jammy-updates main restricted universe multiverse
          deb-src http://archive.ubuntu.com/ubuntu/ jammy-backports main restricted universe multiverse
          deb-src http://security.ubuntu.com/ubuntu jammy-security main restricted universe multiverse
          EOF

      - name: Install build dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y --fix-broken
          sudo apt-get autoremove -y
          sudo apt-get clean
          sudo apt-get upgrade -y
          sudo apt-get install -y \
            build-essential gcc g++ \
            gcc-multilib g++-multilib libc6-dev-i386 \
            flex bison \
            libgnutls28-dev \
            libxml2-dev libxslt1-dev \
            gettext \
            libfreetype6-dev:i386 \
            python3 \
            wget unzip \
            ca-certificates \
            git \
            autoconf automake libtool \
            pkg-config \
            openjdk-17-jdk \
            librsvg2-bin
          sudo apt-get build-dep wine -y || true

      - name: Cache downloaded archives
        uses: actions/cache@v4
        with:
          path: ~/.cache/wine-packaging
          key: wine-android-downloads-v1

      - name: Run build-apks script
        run: |
          chmod +x ./build-apks
          ./build-apks ${{ github.event.inputs.release }}
          # APK dosyasını repository root'a taşı
          mv $HOME/wine/packages/android/wine-*.apk . || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wine-android-arm64-apk
          path: "wine-*.apk"
          if-no-files-found: error
          retention-days: 30

      - name: Upload to GitHub Release
        if: ${{ github.event.inputs.release != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: wine-${{ github.event.inputs.release }}
          files: "wine-*.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
